apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-ess
  namespace: ess
spec:
  endpointSelector: {}
  egress:
    - toEntities:
        - kube-apiserver
    - toCIDR:
        - 172.18.8.1/32
      toPorts:
        - ports:
            - port: "5432"
              protocol: TCP
    - toEntities:
        - host
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: kube-system
            k8s-app: kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
    - toEntities:
        - world
      toPorts:
        - ports:
            - port: "19302" # Allow STUN
              protocol: UDP
            - port: "19302" # Allow STUN
              protocol: TCP
  ingress:
    - fromEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: ess
    - fromEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: traefik
    - fromEntities:
        - world
---
